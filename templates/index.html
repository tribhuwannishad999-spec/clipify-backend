<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clipify AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#000000,#111,#001f3f,#3a0ca3);
background-size:400% 400%;
animation:bgmove 10s infinite alternate;
padding:20px;
}

@keyframes bgmove{
0%{background-position:left;}
100%{background-position:right;}
}

.box{
width:100%;
max-width:420px;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
box-shadow:0 0 25px rgba(0,255,255,0.3);
text-align:center;
color:white;
animation:fade 1s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.logo{
font-size:38px;
font-weight:bold;
background:linear-gradient(to right,#00f5ff,#00ff88,#ff00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:15px;
}

.sub{
font-size:15px;
margin-bottom:25px;
color:#ddd;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:12px;
font-size:15px;
outline:none;
}

.file{
background:white;
padding:10px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:14px;
font-size:18px;
font-weight:bold;
color:white;
background:linear-gradient(90deg,#00f5ff,#00ff88,#ff00ff);
background-size:300%;
animation:btn 4s infinite linear;
cursor:pointer;
}

@keyframes btn{
0%{background-position:left;}
100%{background-position:right;}
}

button:hover{
transform:scale(1.03);
}

.features{
margin-top:20px;
font-size:14px;
color:#ddd;
line-height:28px;
}

.loader{
display:none;
margin-top:20px;
font-size:15px;
color:#00ffcc;
}

</style>
</head>

<body>

<div class="box">

<div class="logo">Clipify AI</div>
<div class="sub">AI Video Enhance • Shorts Maker • Auto Caption</div>

<input type="file" class="file">

<input type="text" placeholder="Paste YouTube Link Here">

<button onclick="run()">🚀 Enhance Now</button>

<div class="loader" id="load">⚡ Processing Video...</div>

<div class="features">
🎬 AI Color Grading <br>
🎵 Original Audio Safe <br>
📱 Shorts Auto Resize <br>
📝 Smart Captions <br>
⬇ Download Ready
</div>

</div>

<script>
function run(){
document.getElementById("load").style.display="block";
setTimeout(()=>{
document.getElementById("load").innerHTML="✅ Video Ready Soon!";
},3000);
}
</script>

</body>
</html>

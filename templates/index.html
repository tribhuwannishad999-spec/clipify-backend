<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clipify AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(135deg,#000,#111,#001f3f,#3a0ca3);
background-size:400% 400%;
animation:bgmove 10s infinite alternate;
}

@keyframes bgmove{
0%{background-position:left;}
100%{background-position:right;}
}

.box{
width:100%;
max-width:430px;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(14px);
box-shadow:0 0 30px rgba(0,255,255,.25);
color:#fff;
text-align:center;
}

.logo{
font-size:38px;
font-weight:bold;
margin-bottom:10px;
background:linear-gradient(90deg,#00f5ff,#00ff88,#ff00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
color:#ddd;
font-size:14px;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:12px;
font-size:15px;
outline:none;
}

button{
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:14px;
font-size:18px;
font-weight:bold;
cursor:pointer;
color:#fff;
background:linear-gradient(90deg,#00f5ff,#00ff88,#ff00ff);
background-size:300%;
animation:btn 4s linear infinite;
}

@keyframes btn{
0%{background-position:left;}
100%{background-position:right;}
}

.loader{
display:none;
margin-top:18px;
color:#00ffcc;
font-size:15px;
}

.result{
display:none;
margin-top:18px;
background:rgba(255,255,255,.08);
padding:15px;
border-radius:15px;
font-size:14px;
}

.features{
margin-top:18px;
font-size:14px;
line-height:28px;
color:#ddd;
}
</style>
</head>

<body>

<div class="box">

<div class="logo">Clipify AI</div>
<div class="sub">AI Video Enhance • Shorts Maker • Auto Caption</div>

<input type="file" id="videoFile">

<input type="text" id="ytlink" placeholder="Paste YouTube Link Here">

<button onclick="run()">🚀 Enhance Now</button>

<div class="loader" id="load">⚡ Processing...</div>

<div class="result" id="result"></div>

<div class="features">
🎬 AI Color Grading <br>
🎵 Original Audio Safe <br>
📱 Shorts Auto Resize <br>
📝 Smart Captions <br>
⬇ Download Ready
</div>

</div>

<script>
async function run(){

let file = document.getElementById("videoFile").files[0];
let link = document.getElementById("ytlink").value;

let load = document.getElementById("load");
let result = document.getElementById("result");

load.style.display="block";
result.style.display="none";

if(file){

let formData = new FormData();
formData.append("video", file);

let res = await fetch("/upload",{
method:"POST",
body:formData
});

let data = await res.json();

load.style.display="none";
result.style.display="block";
result.innerHTML="✅ " + data.message + "<br>📁 " + data.filename;

}

else if(link){

let res = await fetch("/youtube",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({link:link})
});

let data = await res.json();

load.style.display="none";
result.style.display="block";
result.innerHTML="✅ " + data.message + "<br>🔗 Link Accepted";

}

else{

load.style.display="none";
result.style.display="block";
result.innerHTML="❌ Please upload file or paste link";

}

}
</script>

</body>
</html>

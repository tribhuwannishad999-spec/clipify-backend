<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Clipify AI Pro Max</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
min-height:100vh;
padding:18px;
color:#fff;
background:
radial-gradient(circle at top left,#00eaff33,transparent 28%),
radial-gradient(circle at bottom right,#ff00cc33,transparent 28%),
linear-gradient(135deg,#04040b,#0d1025,#000);
overflow-x:hidden;
}
body:before,body:after{
content:"";
position:fixed;
width:260px;height:260px;border-radius:50%;
filter:blur(120px);z-index:-1;opacity:.18;
animation:float 7s infinite alternate;
}
body:before{background:#00eaff;top:-80px;left:-80px}
body:after{background:#ff00cc;right:-80px;bottom:-80px}
@keyframes float{from{transform:translateY(0)}to{transform:translateY(45px)}}

.wrap{max-width:470px;margin:auto}
.top{
display:flex;justify-content:space-between;align-items:center;margin-bottom:20px
}
.logo{
font-size:28px;font-weight:800;
background:linear-gradient(90deg,#00eaff,#00ff88,#ff00cc);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.badge{
padding:8px 14px;border-radius:30px;font-size:12px;font-weight:700;
background:linear-gradient(90deg,#ff00cc,#00eaff);
animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

.hero{text-align:center;margin-bottom:20px}
.hero h1{
font-size:38px;line-height:1.1;font-weight:800;
background:linear-gradient(90deg,#fff,#00eaff,#ff00cc);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hero p{font-size:14px;color:#c6c8db;margin-top:10px}

.card{
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(14px);
border-radius:28px;
padding:22px;
box-shadow:0 0 30px rgba(0,234,255,.08);
}

.zone{
padding:22px 16px;
border-radius:22px;
border:2px dashed rgba(255,255,255,.12);
background:rgba(255,255,255,.03);
text-align:center;
}

.icon{
width:78px;height:78px;margin:auto;
border-radius:22px;
display:flex;justify-content:center;align-items:center;
font-size:34px;
background:linear-gradient(135deg,#00eaff,#ff00cc);
margin-bottom:14px;
animation:spin 5s linear infinite;
}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

.zone h3{font-size:24px}
.zone p{font-size:13px;color:#cdd0e2;margin-top:8px}

input{
width:100%;
padding:15px;
margin-top:14px;
border:none;
outline:none;
border-radius:14px;
font-size:14px;
background:#fff;
color:#111;
}

#videoFile{display:none}

.upbtn,.go{
display:block;
width:100%;
padding:16px;
margin-top:14px;
border:none;
border-radius:18px;
font-size:16px;
font-weight:800;
text-align:center;
cursor:pointer;
color:#fff;
background:linear-gradient(90deg,#00eaff,#00ff88,#ff00cc);
background-size:250% 250%;
animation:grad 4s linear infinite;
}
.go{font-size:17px;background:linear-gradient(90deg,#ff00cc,#7a5cff,#00eaff)}
@keyframes grad{0%{background-position:0 50%}100%{background-position:100% 50%}}

.meta,.loader,.result{
margin-top:14px;
padding:14px;
border-radius:16px;
font-size:14px;
}
.meta{padding:0;background:none;color:#d7d9e8}
.loader{display:none;background:rgba(0,234,255,.08);color:#00eaff}
.result{display:none;background:rgba(0,255,136,.08);color:#9affd2}

.bar{
display:none;
margin-top:12px;
height:10px;
background:#1b1d2f;
border-radius:20px;
overflow:hidden;
}
.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#00eaff,#ff00cc);
transition:.3s;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:18px;
}
.small{
padding:12px;
border-radius:18px;
background:rgba(255,255,255,.05);
text-align:center;
font-size:12px;
color:#d8daea;
}
.small b{display:block;color:#00eaff;font-size:18px}

footer{text-align:center;font-size:12px;color:#a0a4bb;padding:22px 0 8px}
</style>
</head>
<body>

<div class="wrap">

<div class="top">
<div class="logo">Clipify AI</div>
<div class="badge">LIVE</div>
</div>

<div class="hero">
<h1>Long Video To <br> Viral Shorts</h1>
<p>Upload video and generate real downloadable short clips instantly.</p>
</div>

<div class="card">

<div class="zone">
<div class="icon">⚡</div>
<h3>Create Instantly</h3>
<p>Select your video and generate a 15 sec short</p>

<input type="file" id="videoFile" accept="video/*">
<label for="videoFile" class="upbtn">📁 SELECT VIDEO FILE</label>

<button class="go" onclick="run()">🚀 GENERATE SHORT NOW</button>

<div class="meta" id="meta">No file selected</div>

<div class="loader" id="load">⚡ Processing your video...</div>

<div class="bar" id="bar">
<div class="fill" id="fill"></div>
</div>

<div class="result" id="result"></div>

</div>

<div class="grid">
<div class="small"><b>10K+</b>Users</div>
<div class="small"><b>50K+</b>Shorts</div>
<div class="small"><b>99%</b>Happy</div>
</div>

</div>

<footer>© 2026 Clipify AI Pro Max</footer>

</div>

<script>
const fileInput=document.getElementById("videoFile");
fileInput.addEventListener("change",function(){
if(this.files[0]){
document.getElementById("meta").innerHTML="📁 "+this.files[0].name;
}
});

async function run(){

let file=fileInput.files[0];
let load=document.getElementById("load");
let result=document.getElementById("result");
let bar=document.getElementById("bar");
let fill=document.getElementById("fill");

if(!file){
result.style.display="block";
result.innerHTML="❌ Please select video first";
return;
}

load.style.display="block";
bar.style.display="block";
result.style.display="none";

let p=0;
let timer=setInterval(()=>{
p+=5;
if(p<=95){fill.style.width=p+"%";}
},200);

let fd=new FormData();
fd.append("video",file);

try{

let res=await fetch("/upload",{method:"POST",body:fd});

clearInterval(timer);
fill.style.width="100%";

if(res.ok){

let blob=await res.blob();
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="clipify-short.mp4";
document.body.appendChild(a);
a.click();
a.remove();

load.style.display="none";
result.style.display="block";
result.innerHTML="✅ Short generated & download started";

}else{
load.style.display="none";
result.style.display="block";
result.innerHTML="❌ Failed to process video";
}

}catch(e){
clearInterval(timer);
load.style.display="none";
result.style.display="block";
result.innerHTML="❌ Server error";
}

}
</script>

</body>
</html>
